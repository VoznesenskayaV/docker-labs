apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab41-frontend-deploy
  namespace: lab41
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab41-frontend
  template:
    metadata:
      labels:
        app: lab41-frontend
    spec:
      containers:
      - name: frontend
        image: task-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        env:
        - name: BACKEND_URL
          value: "http://lab41-backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: lab41-frontend-service
  namespace: lab41
spec:
  selector:
    app: lab41-frontend
  type: NodePort
  ports:
    - port: 80
      targetPort: 8501
      nodePort: 30081

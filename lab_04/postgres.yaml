apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab41-postgres-deploy
  namespace: lab41
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab41-postgres
  template:
    metadata:
      labels:
        app: lab41-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: lab41-postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: lab41-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lab41-postgres-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: lab41-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lab41-postgres-service
  namespace: lab41
spec:
  selector:
    app: lab41-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
